services:
  tastebud:
    image: tastebud-tastebud
    command: python main.py
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - tastebud-data:/app/data
      - chroma-cache:/root/.cache/chroma
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  tastebud-data:
  chroma-cache:
